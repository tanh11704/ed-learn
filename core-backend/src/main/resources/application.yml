spring:
  application:
    name: core-backend

  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://localhost:5432/edlearn_db
    username: ${DB_USERNAME:edlearn}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    check-location: true

logging:
  level:
    org.flywaydb: DEBUG

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000
      database: 0

jwt:
  secret: ${JWT_SECRET:7vsOJNohR7YoGJ2Uh6vM6FNMzOCOtcGQrKlKCpVORac}
  access-token-expiration: ${JWT_EXPIRATION:900000}
  refresh-token-expiration: ${REFRESH_EXPIRATION:604800000}

app:
  storage:
    type: local
    local-dir: uploads/
