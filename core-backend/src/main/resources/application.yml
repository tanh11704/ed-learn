spring:
  application:
    name: core-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/edlearn_db
    username: ${DB_USERNAME:edlearn}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000
      database: 0

jwt:
  secret: ${JWT_SECRET:7vsOJNohR7YoGJ2Uh6vM6FNMzOCOtcGQrKlKCpVORac}
  expiration: ${JWT_EXPIRATION:900000}
  refresh-expiration: ${REFRESH_EXPIRATION:604800000}
