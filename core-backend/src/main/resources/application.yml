spring:
  application:
    name: core-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/edlearn_db
    username: ${DB_USERNAME:edlearn}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
