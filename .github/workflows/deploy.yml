name: CD Pipeline EdTech

on:
  push:
    branches: ["main"]
    paths
      - 'core-backend/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/java-ci-ai-review.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./core-backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vku-edtech-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/edtech
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vku-edtech-backend:latest
            docker-compose up -d --force-recreate backend
            docker image prune -f
