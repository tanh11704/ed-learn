name: "☕ Java CI & 🤖 AI Code Review"

on:
  pull_request:
    branches: ["main"]
    paths:
      - "core-backend/**"

jobs:
  # === BƯỚC 1: KIỂM TRA MÃ NGUỒN VÀ BUILD ===
  build-and-test:
    name: "Build & Compile (Spring Boot)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Build with Maven
        working-directory: ./core-backend
        run: ./mvnw clean package -DskipTests

  # === BƯỚC 2: AI REVIEW CODE VỚI TECH LEAD PERSONA ===
  ai-code-review:
    name: "AI Code Review (Tech Lead Mode)"
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: PR Agent Action (CodiumAI)
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          github_action_config.auto_review: "true"

          # ĐÂY LÀ NƠI BƠM PROMPT CỦA BẠN VÀO
          pr_reviewer.extra_instructions: |
            Bạn là một Senior Software Engineer và Tech Lead với hơn 10 năm kinh nghiệm.
            Hãy review Pull Request này một cách khắt khe và mang tính xây dựng.

            Phân tích code dựa trên 6 tiêu chí:
            1. Logic Correctness (Bug, Edge cases).
            2. Code Quality (Naming, Clean code, DRY, Smells).
            3. Architecture & Design (SOLID, Separation of concerns, Design Patterns).
            4. Performance (Time/Space Complexity, Bottlenecks).
            5. Security (Injection, Input validation).
            6. Maintainability (Readability, Tách hàm/class).

            BẮT BUỘC trình bày response bằng Tiếng Việt theo cấu trúc 4 phần:
            ### 1. 🔍 Tổng quan Code
            ### 2. 🚨 Các vấn đề phát hiện (Bugs & Code Smells)
            ### 3. 💡 Gợi ý cải thiện (Tech Lead Mindset - Giải thích TẠI SAO)
            ### 4. 🛠️ Phiên bản Code Refactor (Clean Code)

            Luôn nhớ: Kiểm tra Validation, Security và Error Handling nếu đây là code Backend.
